name: Telegram File Downloader

on:
  workflow_dispatch:
    inputs:
      tg_link:
        description: 'لینک پیام تلگرام را اینجا قرار دهید'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          pip install yt-dlp

      # STEP جدید و دقیق‌تر برای دانلود با نام ثابت و بررسی خطا
      - name: Download file from Telegram
        run: |
          # دانلود با یک نام ثابت (file_to_download) برای جلوگیری از پیچیدگی
          yt-dlp --no-playlist -o "downloads/file_to_download.%(ext)s" "${{ github.event.inputs.tg_link }}"
          
          # بررسی می‌کند که آیا فایلی دانلود شده است یا خیر
          if [ -z "$(ls -A downloads 2>/dev/null)" ]; then
            echo "ERROR: No file was downloaded from the provided link!"
            exit 1
          else
            echo "Download successful. Files in downloads folder:"
            ls -la downloads/
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # اضافه کردن هر چیزی که در پوشه downloads است
          git add downloads/
          
          # اگر تغییری وجود داشت، commit و push کن
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Add downloaded file from Telegram"
            git push
            echo "Files successfully committed and pushed to the repository."
          else
            echo "No new file to commit. The downloads folder might be empty."
            exit 1
          fi
