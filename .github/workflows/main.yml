name: Telegram File Downloader

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'شناسه فایل (file_id) را وارد کنید'
        required: true
        default: ''
        type: string
      part_size_mb:
        description: 'حداکثر حجم هر پارت (مگابایت) - پیشفرض 80'
        required: false
        default: '80'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create downloads folder
        run: mkdir -p downloads
      
      - name: Download file using Bot API
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          FILE_ID="${{ github.event.inputs.file_id }}"
          
          echo "Downloading file with ID: $FILE_ID"
          
          # Get file path
          RESPONSE=$(curl -s "https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${FILE_ID}")
          echo "API Response: $RESPONSE"
          
          FILE_PATH=$(echo "$RESPONSE" | jq -r '.result.file_path')
          
          if [ "$FILE_PATH" = "null" ] || [ -z "$FILE_PATH" ]; then
            echo "Error: Invalid file_id or bot cannot access this file"
            exit 1
          fi
          
          # Download the file
          curl -L -o "downloads/$(basename "$FILE_PATH")" "https://api.telegram.org/file/bot${BOT_TOKEN}/${FILE_PATH}"
          
          echo "Download completed!"
          ls -la downloads/
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add downloaded file from Telegram" || echo "No changes to commit"
          git push
