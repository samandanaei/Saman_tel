name: Telegram File Downloader (نسخه نهایی با پارت بندی صحیح)

on:
  workflow_dispatch:
    inputs:
      tg_link:
        description: 'لینک پیام تلگرام را اینجا قرار دهید'
        required: true
        type: string
      part_size_mb:
        description: 'حداکثر حجم هر پارت به مگابایت (پیشفرض 80)'
        required: false
        default: '80'
        type: string

jobs:
  download-and-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create downloads directory
        run: |
          mkdir -p downloads
          # پاک کردن فایل‌های قبلی (اختیاری)
          rm -rf downloads/*

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          pip install yt-dlp

      - name: Download file from Telegram
        id: download
        run: |
          # دانلود فایل با نام اصلی
          yt-dlp --no-playlist -o "downloads/%(title)s.%(ext)s" "${{ github.event.inputs.tg_link }}"
          
          # پیدا کردن فایل دانلود شده
          cd downloads
          ORIGINAL_FILE=$(ls -1 | head -n 1)
          echo "ORIGINAL_FILE=$ORIGINAL_FILE" >> $GITHUB_ENV
          
          # محاسبه حجم فایل به بایت و مگابایت
          FILE_SIZE_BYTES=$(stat -c%s "$ORIGINAL_FILE")
          FILE_SIZE_MB=$((FILE_SIZE_BYTES / 1024 / 1024))
          echo "FILE_SIZE_MB=$FILE_SIZE_MB" >> $GITHUB_ENV
          echo "Original file: $ORIGINAL_FILE"
          echo "Size: $FILE_SIZE_MB MB"
          cd ..

      - name: Split large file into parts
        if: env.FILE_SIZE_MB > 90
        run: |
          cd downloads
          ORIGINAL="${{ env.ORIGINAL_FILE }}"
          PART_SIZE="${{ github.event.inputs.part_size_mb }}M"
          
          # دریافت نام بدون پسوند
          BASE_NAME="${ORIGINAL%.*}"
          
          # پارت بندی فایل با فرمت name.part001, name.part002, ...
          split -d -a 3 -b "$PART_SIZE" "$ORIGINAL" "${BASE_NAME}.part"
          
          # حذف فایل اصلی
          rm "$ORIGINAL"
          
          # نمایش لیست فایل‌های ایجاد شده
          echo "Created parts:"
          ls -la ${BASE_NAME}.part*
          cd ..

      - name: Rename small files (no split needed)
        if: env.FILE_SIZE_MB <= 90
        run: |
          cd downloads
          ORIGINAL="${{ env.ORIGINAL_FILE }}"
          # فقط تغییر نام به یک فرمت استاندارد
          mv "$ORIGINAL" "downloaded_file" 2>/dev/null || true
          cd ..

      - name: Commit and push all files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Add downloaded file(s) from Telegram"
            git push
            echo "Successfully committed and pushed files to repository."
          else
            echo "No new file to commit."
            exit 1
          fi
